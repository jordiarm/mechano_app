<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mechano_app — {{ mode }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">~/mechano_app<span class="cursor">_</span></div>
            <h2 class="auth-title">{{ mode }}</h2>
            {% if error %}
                <div class="auth-error">{{ error }}</div>
            {% endif %}
            <form method="POST" class="auth-form">
                <input
                    class="auth-input"
                    name="username"
                    type="text"
                    placeholder="username"
                    autocomplete="username"
                    required
                    autofocus
                >
                <input
                    class="auth-input"
                    name="password"
                    type="password"
                    placeholder="password"
                    autocomplete="{{ 'new-password' if mode == 'register' else 'current-password' }}"
                    required
                >
                <button class="btn btn-primary auth-submit" type="submit">{{ mode }}</button>
            </form>
            {% if mode == "login" %}
                <a class="auth-link" href="{{ url_for('register') }}">need an account?</a>
            {% else %}
                <a class="auth-link" href="{{ url_for('login') }}">already have an account?</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
